version: '3.9'

services:

  # ── PostgreSQL ──
  db:
    image: postgres:15-alpine
    container_name: constructor_db
    restart: always
    environment:
      POSTGRES_DB: constructor_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Bot ──
  bot:
    build: .
    container_name: constructor_bot
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/constructor_bot
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bot_network
    volumes:
      - ./logs:/app/logs

  # ── Nginx ──
  nginx:
    image: nginx:alpine
    container_name: constructor_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - bot
    networks:
      - bot_network

  # ── SSL Certbot ──
  certbot:
    image: certbot/certbot
    container_name: constructor_certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot
             --email your@email.com --agree-tos --no-eff-email
             -d yourdomain.com

volumes:
  postgres_data:
  certbot_data:
  certbot_certs:

networks:
  bot_network:
    driver: bridge
